name: Build book

# PR-only workflow: builds the book on a GitHub-hosted runner to catch
# regressions before merge. Does not deploy. The deploy workflow runs
# on push to main against the self-hosted `books` runner on bremen2.

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm packages
        run: npm ci --no-audit --no-fund

      - name: Build HTML and PDF
        run: bundle exec rake build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: book
          path: output/
