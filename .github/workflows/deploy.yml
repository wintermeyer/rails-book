name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    # Self-hosted runner registered on bremen2 under the `eliph` user,
    # with label `eliph`. Shared with elixir-phoenix-ash; the book
    # deploy is CPU-light and runs after Antora builds release their
    # lock, so there is no contention in practice.
    runs-on: [self-hosted, eliph]

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: ./scripts/deploy.sh
